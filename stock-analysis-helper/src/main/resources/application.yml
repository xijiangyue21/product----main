spring:
  application:
    name: stock-analysis-helper
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
server:
  port: 8081
  servlet:
    context-path: /api
langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-plus
        api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
      streaming-chat-model:
        model-name: qwen-plus
        api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
      embedding-model:
        model-name: text-embedding-v4
        api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
bigmodel:
  mcp:
    enabled: false
  api-key: ${BIGMODEL_API_KEY:}
stock:
  api:
    base-url: ${STOCK_API_BASE_URL:http://localhost:3000}
    token: ${STOCK_API_TOKEN:}
